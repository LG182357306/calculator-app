name: Build Calculator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Build APK with Kivy Builder
      uses: APICodeGen/python-for-android-action@v1
      with:
        python-version: '3.10'
        requirements: 'kivy==2.1.0'
        output-filename: 'calculator.apk'

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: calculator.apk
