name: Build Calculator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Debug - Print environment
      run: |
        echo "=== 系统信息 ==="
        echo "OS: $(uname -a)"
        echo "Python版本:"
        python3 --version
        echo "当前目录:"
        pwd
        ls -la

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Debug - Python信息
      run: |
        echo "Python路径:"
        which python3
        python3 --version
        pip3 --version

    - name: Install system packages
      run: |
        echo "=== 安装系统包 ==="
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-dev \
          git \
          openjdk-11-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev
        echo "=== 系统包安装完成 ==="

    - name: Install Python packages
      run: |
        echo "=== 安装Python包 ==="
        pip3 install --upgrade pip
        pip3 install kivy==2.2.0
        echo "=== Kivy安装完成 ==="
        pip3 install buildozer
        echo "=== Buildozer安装完成 ==="
        pip3 list | grep -i kivy
        pip3 list | grep -i buildozer

    - name: Create buildozer.spec
      run: |
        echo "=== 创建buildozer.spec ==="
        cat > buildozer.spec << 'EOF'
[app]
title = Calculator
package.name = calculator
package.domain = org.example
source.dir = .
version = 1.0
requirements = python3,kivy==2.2.0
orientation = portrait
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1
EOF
        cat buildozer.spec
        echo "=== buildozer.spec创建完成 ==="

    - name: Initialize Android SDK
      run: |
        echo "=== 初始化Android SDK ==="
        export ANDROID_HOME="${HOME}/android-sdk"
        export PATH="${PATH}:${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools"
        echo "ANDROID_HOME: $ANDROID_HOME"
        
        if [ ! -d "$ANDROID_HOME" ]; then
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd "$ANDROID_HOME/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
        fi
        
        yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
        "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        echo "=== Android SDK初始化完成 ==="

    - name: Build APK
      run: |
        echo "=== 开始构建APK ==="
        export ANDROID_HOME="${HOME}/android-sdk"
        export PATH="${PATH}:${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools"
        echo "ANDROID_HOME: $ANDROID_HOME"
        
        buildozer android debug || {
          echo "=== 构建失败，检查日志 ==="
          cat .buildozer/*.log 2>/dev/null || true
          exit 1
        }
        
        echo "=== 构建完成 ==="
        ls -la bin/ 2>/dev/null || echo "bin目录不存在"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: calculator-debug-apk
        path: bin/*.apk
        retention-days: 7
